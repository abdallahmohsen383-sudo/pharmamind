
name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v3

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          # إضافة منصة الأندرويد إذا لم تكن موجودة، أو تحديثها إذا كانت موجودة
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          # إعطاء صلاحية التنفيذ لملف جرادل
          chmod +x gradlew
          # بناء ملف APK
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: PharmaMind-APP
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 5
